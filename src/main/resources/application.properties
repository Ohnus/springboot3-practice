spring.application.name=demo

# Server port
server.port = 8081

# MySQL
# RDB 중 연결할 DB 엔진에 대한 드라이브 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# DB가 구동되는 IP (주소)
spring.datasource.url=jdbc:mysql://localhost:33061/practice1?useSSL=false&useUnicode=true&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234

# JPA
# 자바 클래스 기반으로 MySQL 테이블 자동 생성 여부 (update : 스프링 기반으로 MySQL 테이블 업데이트)
spring.jpa.hibernate.ddl-auto=update
# 스프링 Entity와 MySQL 테이블 필드간 필드명 작명 전략
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# JPA(Hibernate)가 실행하는 SQL을 콘솔에 출력
spring.jpa.show-sql=true
# SQL 줄바꿈해서 출력
spring.jpa.properties.hibernate.format_sql=true
# logging 설정 : 파라미터 값 확인
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace

# mustache
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.mustache.servlet.expose-request-attributes=true